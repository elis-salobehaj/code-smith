# ClusterIP service for the webhook server.
# Expose externally via an Ingress or LoadBalancer on top of this Service.
apiVersion: v1
kind: Service
metadata:
  name: code-smith
  namespace: code-smith
  labels:
    app: code-smith-webhook
spec:
  selector:
    app: code-smith-webhook
  ports:
    - name: http
      port: 80
      targetPort: 8020
  type: ClusterIP
